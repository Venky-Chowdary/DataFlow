name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-and-web:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      # MySQL 8 enables ROW-based binlog by default, so MySQL matrix + binlog
      # CDC tests run here instead of silently skipping.
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: dataflow
          MYSQL_DATABASE: dataflow
          MYSQL_USER: dataflow
          MYSQL_PASSWORD: dataflow
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -pdataflow"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dataflow
          POSTGRES_PASSWORD: dataflow
          POSTGRES_DB: dataflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dataflow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          cd ../../packages/preflight
          python -m pip install -e .

      - name: Install Node dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
        env:
          DATAFLOW_JOB_STORE: memory
          DATAFLOW_DISABLE_OBJECT_STORE: "1"

      - name: Build web
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tools and default API deps
        run: |
          python -m pip install --upgrade pip pip-audit bandit
          python -m pip install -r apps/api/requirements.txt

      - name: Assert optional RAG deps are not in default install
        run: |
          python - <<'PY'
          import importlib.util
          for name in ("chromadb", "sentence_transformers"):
              if importlib.util.find_spec(name) is not None:
                  raise SystemExit(f"{name} must not be installed from default requirements.txt")
          print("ok: chromadb/sentence_transformers absent from default env")
          PY

      - name: pip-audit installed default API environment
        # Optional RAG extras (chromadb / sentence-transformers) live in
        # requirements-rag.txt and are intentionally out of this gate.
        run: pip-audit --local

      - name: bandit high-severity gate (production code)
        # Fail on High only — Medium SQL f-string debt is tracked separately;
        # key identifier paths are hardened via connectors/sql_identifiers.py.
        run: >
          bandit -r apps/api/connectors apps/api/services apps/api/src
          -lll
          -q
