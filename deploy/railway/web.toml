# Railway — Web (static UI) service
# Settings → Config file path: deploy/railway/web.toml
# Build variable: VITE_API_BASE = https://${{dataflow-api.RAILWAY_PUBLIC_DOMAIN}}/api/v1
# (replace dataflow-api with your API service name)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway.web"
watchPatterns = ["apps/web/**", "packages/design-system/**", "Dockerfile.railway.web"]

[deploy]
startCommand = "nginx -g 'daemon off;'"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
