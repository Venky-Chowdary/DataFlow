# Railway — Transfer Worker (data plane)
# Same Docker image as the API. Does NOT expose HTTP — claims jobs from Mongo.
#
# In Railway: New Service → same GitHub repo → Settings:
#   Config file path: deploy/railway/worker.toml
# Link the same MongoDB plugin (MONGODB_URI / MONGO_URL).
# Set DATAFLOW_WORKER_FLEET=1 on BOTH this worker AND the API service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"
watchPatterns = ["apps/api/**", "packages/preflight/**", "Dockerfile.api", "scripts/start-worker.sh"]

[deploy]
startCommand = "/app/scripts/start-worker.sh"
# Workers have no HTTP health endpoint — Railway uses process liveness.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
