# Staging CD example — schedules require a SIGNED contract before apply.
#
# Flow:
#   1. Apply contracts (land as DRAFT) in a prior step / PR.
#   2. Sign via UI or API.
#   3. CD: plan, then apply with --require-signed-contracts --yes
#
#   npm run dataflow -- validate -f examples/gitops/dataflow.staging.yaml
#   npm run dataflow -- plan -f examples/gitops/dataflow.staging.yaml --local
#   npm run dataflow -- apply -f examples/gitops/dataflow.staging.yaml --local --yes --require-signed-contracts
#
# Honesty: CDC remains at-least-once. Contracts in this file are illustrative;
# CD gate refuses schedules unless contract_id is SIGNED in the target workspace.

apiVersion: dataflow.space/v1
kind: DataFlowManifest
metadata:
  generator: dataflow-gitops-staging-example
  environment: staging
resources:
  - apiVersion: dataflow.space/v1
    kind: PipelineSchedule
    metadata:
      name: staging-orders-incremental
    spec:
      name: staging-orders-incremental
      source_connector_id: src-postgres-staging
      source_table: public.orders
      dest_connector_id: dest-snowflake-staging
      dest_table: STAGING.ORDERS
      interval: hourly
      sync_mode: incremental
      cursor_column: updated_at
      primary_key: id
      enabled: false
      contract_id: replace-with-signed-contract-id
      require_signed_contract: true
